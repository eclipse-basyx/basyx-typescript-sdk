name: Lint SDK

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up pnpm
      uses: pnpm/action-setup@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install Dependencies
      run: |
        pnpm install --frozen-lockfile

    - name: Check formatting
      run: |
        pnpm format:check

    - name: Lint
      run: |
        pnpm lint:check
