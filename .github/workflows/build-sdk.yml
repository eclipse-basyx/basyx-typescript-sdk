name: Build SDK

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up pnpm
      uses: pnpm/action-setup@v5

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install Dependencies
      run: |
        pnpm install --frozen-lockfile

    - name: Build
      run: |
        pnpm build

    - name: Bundle
      run: |
        pnpm bundle

    - name: Verify Consumer Compatibility
      run: |
        pnpm verify:compat
