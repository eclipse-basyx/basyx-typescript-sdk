name: Build SDK

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'openapi/**'
      - 'rolldown.config.mjs'
      - 'tsconfig*.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/build-sdk.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up pnpm
      uses: pnpm/action-setup@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install Dependencies
      run: |
        pnpm install --frozen-lockfile

    - name: Build
      run: |
        pnpm build

    - name: Bundle
      run: |
        pnpm bundle

    - name: Verify Consumer Compatibility
      run: |
        pnpm verify:compat
